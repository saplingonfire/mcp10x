# MCP10x Configuration
# Copy this file to config.yaml and fill in your values.
# See README.md for full documentation.

# Jira Server connection
jira:
  enabled: true
  base_url: "https://jira.example.com"
  # PAT can be set here or via MCP10X_JIRA_PAT env var (env var takes precedence)
  pat: ""
  default_project: "MYPROJ"
  username: "your.email@example.com"
  # Default fields merged into every jira_create_ticket call (config defaults → extra_fields → named params).
  # Values are auto-normalized but prefer using JIRA-native formats:
  #   - Array fields (components, fixVersions): use a list     [{name: "X"}]
  #   - String fields (Epic Link / customfield_10001): use a plain string  "PROJ-123"
  #   - Option select custom fields: use {value: "Option Name"} or {id: "12345"}
  #   - Object fields (assignee, priority): use {name: "..."} as usual
  default_fields: {}
  # Example:
  #   default_fields:
  #     components:
  #       - name: "MyComponent"
  #     customfield_10001: "PROJ-123"
  #     customfield_12411:
  #       value: "Technical Project"
  #     assignee:
  #       name: "your.email@example.com"

# Confluence Server connection
confluence:
  enabled: true
  base_url: "https://confluence.example.com"
  # PAT can be set here or via MCP10X_CONFLUENCE_PAT env var (env var takes precedence)
  pat: ""
  default_spaces: ["TEAM", "DOCS"]
  # Title prefixes/keywords to auto-filter searches (e.g. "[ACR]", "[RFC]")
  title_filters: []
  tech_doc_template:
    sections: ["Overview", "Architecture", "API", "Testing", "Deployment"]
    default_space: "DOCS"

# GitLab Server connection
gitlab:
  enabled: true
  base_url: "https://gitlab.example.com"
  # PAT can be set here or via MCP10X_GITLAB_PAT env var (env var takes precedence)
  pat: ""
  default_project: ""  # e.g. "group/project" or numeric project ID

# Coding style rules
rules:
  rules_dir: "rules"
  categories:
    - code_style
    - architecture
    - libraries
    - code_review
    - testing
  primary_language: "go"
  additional_languages: ["typescript", "python"]

# Session context
context:
  file_path: ".context.yaml"

# Roles framework — specialized functional personas
roles:
  roles_dir: "roles"
  # Bundled roles auto-created on first run. Remove entries to skip.
  default_roles:
    - product_manager
    - software_engineer
    - qa_engineer
    - technical_writer
    - data_analyst
    - data_scientist
    - devops_sre
    - ux_designer

# Artifact persistence — typed outputs from roles
artifacts:
  artifacts_dir: "artifacts"

# Workflow orchestration — multi-role handoffs
workflows:
  workflows_dir: "workflows"
