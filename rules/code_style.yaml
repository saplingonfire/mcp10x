rules:
- id: cs-001
  rule: >-
    Use conventional commit prefixes in commit titles:
    feat: (new feature),
    fix: (bug fix),
    refactor: (restructuring without behavior change),
    docs: (documentation only),
    test: (adding or updating tests),
    chore: (build, CI, tooling, dependencies),
    style: (formatting, whitespace, no logic change),
    perf: (performance improvement),
    ci: (CI/CD pipeline changes),
    revert: (reverting a previous commit).
    Format: "<prefix>: <lowercase imperative summary>".
    Omit the prefix only for the initial commit.
  rationale: >-
    Conventional commits enable automated changelogs, semantic versioning,
    and make git history scannable at a glance.
  added: '2026-03-10'
